services:
  obsidian-sync:
    build: ./sync
    container_name: obsidian-sync
    restart: unless-stopped
    volumes:
      - ./data/vault:/vault
      - ./data/obsidian-config:/home/node/.config/obsidian-headless
    environment:
      - OBSIDIAN_VAULT_NAME=${OBSIDIAN_VAULT_NAME:-}
      - OBSIDIAN_DEVICE_NAME=${OBSIDIAN_DEVICE_NAME:-}
      - OBSIDIAN_E2E_PASSWORD=${OBSIDIAN_E2E_PASSWORD:-}
      - SYNC_CONFIGS=${SYNC_CONFIGS:-}
      - SYNC_FILE_TYPES=${SYNC_FILE_TYPES:-}
      - SYNC_CONFLICT_STRATEGY=${SYNC_CONFLICT_STRATEGY:-}
      - SYNC_MODE=${SYNC_MODE:-}
      - SYNC_EXCLUDED_FOLDERS=${SYNC_EXCLUDED_FOLDERS:-}
    stdin_open: true
    tty: true

  backup:
    build: ./backup
    container_name: obsidian-backup
    restart: unless-stopped
    depends_on:
      - obsidian-sync
    volumes:
      - ./data/vault:/vault:ro
      - ./data/backups:/backups
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - BACKUP_PASSWORD=${BACKUP_PASSWORD:-}
