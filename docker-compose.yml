services:
  obsidian-sync:
    build: ./sync
    container_name: obsidian-sync
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./data/vault:/vault
      - ./data/obsidian-config:/obsidian-home/.config/obsidian-headless
    environment:
      - HOME=/obsidian-home
      - OBSIDIAN_VAULT_NAME=${OBSIDIAN_VAULT_NAME:-}
      - OBSIDIAN_DEVICE_NAME=${OBSIDIAN_DEVICE_NAME:-}
      - OBSIDIAN_E2E_PASSWORD=${OBSIDIAN_E2E_PASSWORD:-}
      - SYNC_CONFIGS=${SYNC_CONFIGS:-}
      - SYNC_FILE_TYPES=${SYNC_FILE_TYPES:-}
      - SYNC_CONFLICT_STRATEGY=${SYNC_CONFLICT_STRATEGY:-}
      - SYNC_MODE=${SYNC_MODE:-}
      - SYNC_EXCLUDED_FOLDERS=${SYNC_EXCLUDED_FOLDERS:-}
    stdin_open: true
    tty: true

  backup:
    build: ./backup
    container_name: obsidian-backup
    restart: unless-stopped
    depends_on:
      - obsidian-sync
    volumes:
      - ./data/vault:/vault:ro
      - ./data/backups/hourly:/backups/hourly
      - ./data/backups/daily:/backups/daily
      - ./data/backups/permanent:/backups/permanent
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - BACKUP_PASSWORD=${BACKUP_PASSWORD:-}
